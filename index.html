<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>FCM.41.020.078.24</title>
    <meta name="description" content="Luxury Villa - A-Frame VR Experience">
    <script src="aframe.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000;
        }
        .nav-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .camera-controls {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .camera-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            min-width: 40px;
            text-align: center;
        }
        .camera-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
        .camera-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="nav-hint">WASD to move · Mouse to look</div>
    
    <div class="camera-controls">
        <button class="camera-btn" id="camera-up">↑</button>
        <button class="camera-btn" id="camera-down">↓</button>
    </div>

    <script>
        // Auto-scale component for proportional model scaling
        AFRAME.registerComponent('auto-scale', {
            schema: {
                targetHeight: { type: 'number', default: 1 },
                targetLength: { type: 'number', default: 0 }
            },
            
            init: function() {
                this.modelLoaded = this.modelLoaded.bind(this);
                this.el.addEventListener('model-loaded', this.modelLoaded);
            },
            
            modelLoaded: function() {
                const mesh = this.el.getObject3D('mesh');
                if (!mesh) return;
                
                const box = new THREE.Box3().setFromObject(mesh);
                const size = box.getSize(new THREE.Vector3());
                
                let scaleFactor = 1;
                if (this.data.targetLength > 0) {
                    scaleFactor = this.data.targetLength / size.x;
                } else {
                    scaleFactor = this.data.targetHeight / size.y;
                }
                
                this.el.setAttribute('scale', `${scaleFactor} ${scaleFactor} ${scaleFactor}`);
            }
        });
        
        // Camera height controls
        document.addEventListener('DOMContentLoaded', function() {
            const rig = document.querySelector('#rig');
            const upBtn = document.querySelector('#camera-up');
            const downBtn = document.querySelector('#camera-down');
            
            if (rig && upBtn && downBtn) {
                upBtn.addEventListener('click', function() {
                    const currentPos = rig.getAttribute('position');
                    rig.setAttribute('position', {
                        x: currentPos.x,
                        y: currentPos.y + 0.5,
                        z: currentPos.z
                    });
                });
                
                downBtn.addEventListener('click', function() {
                    const currentPos = rig.getAttribute('position');
                    rig.setAttribute('position', {
                        x: currentPos.x,
                        y: Math.max(0.1, currentPos.y - 0.5),
                        z: currentPos.z
                    });
                });
            }
        });
    </script>

    <a-scene 
        renderer="antialias: true; colorManagement: true"
        background="color: #87CEEB">
        
        <a-assets timeout="10000">
            <!-- Models -->
            <a-asset-item id="villa-model" src="villa.glb"></a-asset-item>
            <a-asset-item id="car-model" src="car.glb"></a-asset-item>
            <a-asset-item id="truck-model" src="lambo.glb"></a-asset-item>
            <a-asset-item id="dog-model" src="dog.glb"></a-asset-item>
            <a-asset-item id="tree-model" src="tree.glb"></a-asset-item>
            
            <!-- Textures -->
            <img id="grass-tex" src="grass.png">
            <img id="sky-tex" src="sky.jpg">
        </a-assets>

        <!-- Sky -->
        <a-sky src="#sky-tex"></a-sky>

        <!-- Lighting -->
        <a-light type="ambient" color="#FFF5E0" intensity="0.4"></a-light>
        <a-light type="directional" 
                 position="10 20 10" 
                 color="#FFFFFF" 
                 intensity="0.8">
        </a-light>

        <!-- Camera Rig with Controls -->
        <a-entity id="rig" position="0 3 30">
            <a-camera 
                wasd-controls="acceleration: 40"
                look-controls>
                <a-cursor></a-cursor>
            </a-camera>
        </a-entity>

        <!-- Ground Terrain -->
        <a-plane position="0 0 0" 
                 rotation="-90 0 0" 
                 width="200" height="200" 
                 material="src: #grass-tex; repeat: 50 50">
        </a-plane>

        <!-- Main Villa -->
        <a-gltf-model 
            id="villa"
            src="#villa-model" 
            position="0 0.1 0"
            auto-scale="targetLength: 70">
        </a-gltf-model>


        <!-- Car on Driveway -->
        <a-gltf-model 
            src="#car-model" 
            position="32 1.4 14"
            rotation="0 180 0"
            auto-scale="targetLength: 3">
        </a-gltf-model>

        <a-gltf-model 
            src="#truck-model" 
            position="33 0.1 -3"
            rotation="0 90 0"
            auto-scale="targetLength: 14">
        </a-gltf-model>

        <!-- Dog near entrance -->
        <a-gltf-model 
            src="#dog-model" 
            position="5 0.1 9"
            auto-scale="targetHeight: 3.2">
        </a-gltf-model>

        <!-- Swimming Pool -->
        <a-entity position="0 0 -15">
            
            <!-- Animated Water Surface -->
            <a-plane position="0 -0.1 0" 
                     rotation="-90 0 0" 
                     width="8" height="12" 
                     color="#1a9be6"
                     transparent="true"
                     opacity="0.8">
                <a-animation attribute="material.color" 
                           values="#1a9be6;#0d7abf;#1a9be6" 
                           dur="2000" 
                           repeat="indefinite"></a-animation>
                <a-animation attribute="material.opacity" 
                           values="0.8;0.6;0.8" 
                           dur="3000" 
                           repeat="indefinite"></a-animation>
            </a-plane>
        </a-entity>


    </a-scene>

<!-- END OF SCENE -->
</body>
</html>
